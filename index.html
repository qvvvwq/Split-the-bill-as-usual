<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>分攤儀表板 · Expense Split</title>
<meta name="theme-color" content="#0A0E16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="分攤">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230066FF'/%3E%3Ctext x='32' y='42' font-size='30' text-anchor='middle' fill='white' font-family='sans-serif'%3E分%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0E16; --surface:#121826; --surface2:#1A2234; --line:#212C44;
  --text:#E8EDF6; --muted:#7E8AA0; --faint:#55617A;
  --blue:#0066FF; --blue-soft:rgba(0,102,255,.16); --blue-line:rgba(0,102,255,.45);
  --pos:#2DD4A7; --neg:#FF6B7A; --warn:#F5B54A;
  --radius:14px; --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans TC',-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;
  font-size:15px; line-height:1.55;
  padding:max(16px,env(safe-area-inset-top)) 16px calc(48px + env(safe-area-inset-bottom));
  max-width:760px; margin:0 auto;
}
h1{font-size:20px;font-weight:700;letter-spacing:.02em}
h2{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
.sub{color:var(--muted);font-size:12.5px;margin-top:2px}
header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--blue);box-shadow:0 0 10px var(--blue);margin-right:8px;vertical-align:1px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 16px;margin-bottom:16px}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* ---- KPI ---- */
.kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 12px}
.kpi .lab{font-size:11px;color:var(--muted);letter-spacing:.08em;margin-bottom:6px}
.kpi .val{font-family:var(--mono);font-size:17px;font-weight:600}
.kpi.hl{border-color:var(--blue-line);background:linear-gradient(160deg,var(--blue-soft),var(--surface) 70%)}

/* ---- members ---- */
.members{display:flex;flex-wrap:wrap;gap:8px}
.member-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--line);border-radius:999px;padding:5px 6px 5px 12px}
.member-chip input{background:none;border:none;color:var(--text);font:inherit;font-weight:500;width:5.5em;outline:none}
.member-chip input:focus{border-bottom:1px solid var(--blue)}
.member-chip button{background:none;border:none;color:var(--faint);font-size:15px;cursor:pointer;padding:2px 6px;border-radius:50%}
.member-chip button:hover{color:var(--neg)}
.btn-ghost{background:none;border:1px dashed var(--faint);color:var(--muted);border-radius:999px;padding:6px 14px;font:inherit;font-size:13.5px;cursor:pointer}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}

/* ---- form ---- */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{display:block;font-size:12px;color:var(--muted);margin:10px 0 5px;letter-spacing:.04em}
input[type=date],input[type=text],input[type=number],select{
  width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:10px;
  color:var(--text);font:inherit;padding:10px 12px;outline:none;appearance:none;-webkit-appearance:none;
}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
input[type=number]{font-family:var(--mono)}
.part-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.part{border:1px solid var(--line);background:var(--surface2);color:var(--muted);border-radius:999px;padding:7px 15px;font:inherit;font-size:14px;cursor:pointer;transition:.15s}
.part.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:500}
.btn{width:100%;margin-top:16px;background:var(--blue);border:none;border-radius:11px;color:#fff;font:inherit;font-size:15.5px;font-weight:700;padding:13px;cursor:pointer;letter-spacing:.05em}
.btn:active{transform:scale(.985)}
.btn.secondary{background:var(--surface2);border:1px solid var(--line);color:var(--text);font-weight:500}
.btn.danger-outline{background:none;border:1px solid rgba(255,107,122,.5);color:var(--neg);font-weight:500}
.hint{font-size:12px;color:var(--faint);margin-top:8px}

/* ---- expense list ---- */
.exp{border-top:1px solid var(--line);padding:12px 2px;display:flex;justify-content:space-between;gap:10px}
.exp:first-of-type{border-top:none}
.exp .t1{font-weight:500}
.exp .t2{font-size:12px;color:var(--muted);margin-top:2px}
.exp .amt{font-family:var(--mono);font-weight:600;text-align:right;white-space:nowrap}
.exp .per{font-size:11.5px;color:var(--blue);font-family:var(--mono);text-align:right}
.exp .ops{display:flex;gap:10px;justify-content:flex-end;margin-top:5px}
.linkbtn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:2px 4px;text-decoration:underline;text-underline-offset:3px}
.linkbtn:hover{color:var(--blue)}
.linkbtn.del:hover{color:var(--neg)}
.empty{color:var(--faint);text-align:center;padding:20px 0;font-size:13.5px}

/* ---- summary ---- */
.srow{display:grid;grid-template-columns:4.6em 1fr auto;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.srow:first-of-type{border-top:none}
.srow .name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-wrap{height:8px;background:var(--surface2);border-radius:4px;position:relative;overflow:hidden}
.bar{position:absolute;top:0;height:100%;border-radius:4px}
.bar.p{background:linear-gradient(90deg,var(--blue),#4D94FF)}
.bar.n{background:rgba(255,107,122,.75)}
.srow .net{font-family:var(--mono);font-size:13.5px;font-weight:600;text-align:right;white-space:nowrap}
.net.pos{color:var(--pos)} .net.neg{color:var(--neg)} .net.zero{color:var(--faint)}
.sdetail{font-size:11px;color:var(--faint);grid-column:1/-1;margin-top:-4px;font-family:var(--mono)}
.settle{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}
.settle .item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:14px}
.settle .arrow{color:var(--blue);font-family:var(--mono)}
.settle .amt{margin-left:auto;font-family:var(--mono);font-weight:600;color:var(--blue)}
.badge-ok{display:inline-block;font-size:11px;color:var(--pos);border:1px solid rgba(45,212,167,.4);border-radius:999px;padding:2px 10px}
.badge-warn{display:inline-block;font-size:11px;color:var(--warn);border:1px solid rgba(245,181,74,.4);border-radius:999px;padding:2px 10px}

/* ---- backups ---- */
.bk{display:flex;justify-content:space-between;align-items:center;gap:10px;border-top:1px solid var(--line);padding:11px 2px}
.bk:first-of-type{border-top:none}
.bk .t1{font-size:13.5px;font-weight:500;font-family:var(--mono)}
.bk .t2{font-size:11.5px;color:var(--muted)}
/* ---- confirm dialog ---- */
.overlay{position:fixed;inset:0;background:rgba(4,7,12,.72);display:none;align-items:center;justify-content:center;z-index:20;padding:24px;backdrop-filter:blur(3px)}
.overlay.show{display:flex}
.dialog{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px 20px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.dialog p{font-size:15px;white-space:pre-line;margin-bottom:18px}
.dialog .row{display:flex;gap:10px}
.dialog button{flex:1;font:inherit;font-size:15px;font-weight:600;padding:11px;border-radius:10px;cursor:pointer}
.dialog .ok{background:var(--blue);border:none;color:#fff}
.dialog .ok.danger{background:#D93A4C}
.dialog .no{background:var(--surface2);border:1px solid var(--line);color:var(--text)}

.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--blue-line);color:var(--text);padding:10px 20px;border-radius:999px;font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;z-index:9;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:560px){body{font-size:15.5px}.kpi .val{font-size:19px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div>
    <h1><span class="dot"></span>分攤儀表板</h1>
    <div class="sub">Expense Split · 資料儲存在此裝置</div>
  </div>
</header>

<!-- KPI -->
<div class="kpis">
  <div class="kpi hl"><div class="lab">總支出</div><div class="val" id="kpiTotal">0</div></div>
  <div class="kpi"><div class="lab">筆數</div><div class="val" id="kpiCount">0</div></div>
  <div class="kpi"><div class="lab">帳目</div><div class="val" id="kpiBalance" style="font-size:13px">—</div></div>
</div>

<!-- 成員 -->
<div class="card">
  <h2>成員</h2>
  <div class="members" id="memberList"></div>
  <div style="margin-top:10px"><button class="btn-ghost" id="addMember">＋ 新增成員</button></div>
  <div class="hint">點名稱可直接修改；成員已有費用紀錄時無法刪除。</div>
</div>

<!-- 新增費用 -->
<div class="card">
  <h2 id="formTitle">新增費用</h2>
  <div class="grid2">
    <div><label>日期</label><input type="date" id="fDate"></div>
    <div><label>付款人</label><select id="fPayer"></select></div>
  </div>
  <div class="grid2">
    <div><label>品項</label><input type="text" id="fItem" placeholder="例：Lunch / Court"></div>
    <div><label>金額</label><input type="number" id="fAmount" inputmode="decimal" placeholder="0"></div>
  </div>
  <label>參與分攤的人（點選）</label>
  <div class="part-row" id="fParts"></div>
  <button class="btn" id="submitExp">加入這筆費用</button>
  <button class="btn secondary" id="cancelEdit" style="display:none">取消編輯</button>
</div>

<!-- 費用清單 -->
<div class="card">
  <h2>費用清單</h2>
  <div id="expList"></div>
</div>

<!-- 彙整 -->
<div class="card">
  <h2>彙整 · 結算</h2>
  <div id="summary"></div>
  <div class="settle" id="settle"></div>
</div>

<!-- 備份與清除 -->
<div class="card">
  <h2>備份（保留最近 6 次）</h2>
  <div id="bkList"></div>
  <button class="btn secondary" id="backupNow">立即備份目前資料</button>
  <button class="btn danger-outline" id="clearBtn">清除已輸入資料（保留成員名稱）</button>
  <div class="hint">清除前會自動備份一次。備份以費用的輸入日期範圍命名，超過 6 份會刪除最舊的。</div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="dialog" role="alertdialog" aria-modal="true">
    <p id="dlgMsg"></p>
    <div class="row">
      <button class="no" id="dlgNo">取消</button>
      <button class="ok" id="dlgOk">確定</button>
    </div>
  </div>
</div>

<script>
'use strict';
const KEY='expense-split-v1';
const $=id=>document.getElementById(id);
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=n=>Number(n).toLocaleString('zh-Hant',{maximumFractionDigits:2});

/* ---------- custom confirm (取代被沙盒擋掉的 confirm()) ---------- */
let dlgCb=null;
function askConfirm(msg,onYes,danger){
  $('dlgMsg').textContent=msg;
  $('dlgOk').className='ok'+(danger?' danger':'');
  dlgCb=onYes;
  $('overlay').classList.add('show');
}
$('dlgOk').onclick=()=>{$('overlay').classList.remove('show');const cb=dlgCb;dlgCb=null;if(cb)cb();};
$('dlgNo').onclick=()=>{$('overlay').classList.remove('show');dlgCb=null;};
$('overlay').onclick=e=>{if(e.target===$('overlay')){$('overlay').classList.remove('show');dlgCb=null;}};

/* ---------- state + storage ---------- */
let state={members:[],expenses:[],backups:[]};
let mem=null; // in-memory fallback
function load(){
  try{const raw=localStorage.getItem(KEY); if(raw){state=JSON.parse(raw);return;}}catch(e){}
  if(mem){state=mem;return;}
  state={members:[{id:uid(),name:'Pai'},{id:uid(),name:'Sophie'},{id:uid(),name:'Zoe'},{id:uid(),name:'Randy'}],expenses:[],backups:[]};
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(state));}
  catch(e){mem=state; toast('此環境無法永久儲存，部署到 GitHub Pages 後即可');}
}

/* ---------- toast ---------- */
let tt;
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);}

/* ---------- members ---------- */
function renderMembers(){
  const box=$('memberList');box.innerHTML='';
  state.members.forEach(m=>{
    const chip=document.createElement('div');chip.className='member-chip';
    const inp=document.createElement('input');inp.value=m.name;inp.maxLength=12;
    inp.onchange=()=>{m.name=inp.value.trim()||m.name;inp.value=m.name;save();renderAll();};
    const del=document.createElement('button');del.textContent='✕';del.setAttribute('aria-label','刪除成員');
    del.onclick=()=>{
      const used=state.expenses.some(e=>e.payer===m.id||e.parts.includes(m.id));
      if(used){toast('此成員已有費用紀錄，無法刪除');return;}
      if(state.members.length<=2){toast('至少需保留 2 位成員');return;}
      askConfirm('刪除成員「'+m.name+'」？',()=>{state.members=state.members.filter(x=>x.id!==m.id);save();renderAll();},true);
    };
    chip.append(inp,del);box.appendChild(chip);
  });
}
$('addMember').onclick=()=>{
  if(state.members.length>=8){toast('最多 8 位成員');return;}
  state.members.push({id:uid(),name:'成員'+(state.members.length+1)});save();renderAll();
};

/* ---------- form ---------- */
let editingId=null, selectedParts=new Set();
function renderForm(){
  const sel=$('fPayer');const cur=sel.value;sel.innerHTML='<option value="">— 選擇 —</option>';
  state.members.forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=m.name;sel.appendChild(o);});
  if([...sel.options].some(o=>o.value===cur))sel.value=cur;
  const box=$('fParts');box.innerHTML='';
  state.members.forEach(m=>{
    const b=document.createElement('button');b.type='button';b.className='part'+(selectedParts.has(m.id)?' on':'');
    b.textContent=m.name;
    b.onclick=()=>{selectedParts.has(m.id)?selectedParts.delete(m.id):selectedParts.add(m.id);renderForm();};
    box.appendChild(b);
  });
}
function resetForm(){
  editingId=null;selectedParts=new Set();
  $('fDate').value=new Date().toISOString().slice(0,10);
  $('fPayer').value='';$('fItem').value='';$('fAmount').value='';
  $('formTitle').textContent='新增費用';$('submitExp').textContent='加入這筆費用';
  $('cancelEdit').style.display='none';renderForm();
}
$('cancelEdit').onclick=resetForm;
$('submitExp').onclick=()=>{
  const date=$('fDate').value, payer=$('fPayer').value,
        item=$('fItem').value.trim(), amount=parseFloat($('fAmount').value);
  if(!date){toast('請選擇日期');return;}
  if(!payer){toast('請選擇付款人');return;}
  if(!(amount>0)){toast('請輸入金額');return;}
  if(selectedParts.size===0){toast('請至少選一位參與分攤');return;}
  const parts=state.members.filter(m=>selectedParts.has(m.id)).map(m=>m.id);
  if(editingId){
    const e=state.expenses.find(x=>x.id===editingId);
    Object.assign(e,{date,payer,item:item||'未命名',amount,parts});
    toast('已更新');
  }else{
    state.expenses.push({id:uid(),date,payer,item:item||'未命名',amount,parts});
    toast('已加入');
  }
  save();resetForm();renderAll();
};

/* ---------- expense list ---------- */
const nameOf=id=>(state.members.find(m=>m.id===id)||{name:'?'}).name;
function renderExpenses(){
  const box=$('expList');box.innerHTML='';
  if(state.expenses.length===0){box.innerHTML='<div class="empty">尚無費用，從上方輸入第一筆</div>';return;}
  [...state.expenses].sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>{
    const per=e.amount/e.parts.length;
    const row=document.createElement('div');row.className='exp';
    row.innerHTML=
      '<div><div class="t1">'+esc(e.item)+'</div>'+
      '<div class="t2">'+e.date+' · '+esc(nameOf(e.payer))+' 付 · '+e.parts.map(p=>esc(nameOf(p))).join('、')+'</div></div>'+
      '<div><div class="amt num">'+fmt(e.amount)+'</div>'+
      '<div class="per">每人 '+fmt(per)+'</div>'+
      '<div class="ops"><button class="linkbtn" data-e="'+e.id+'">編輯</button>'+
      '<button class="linkbtn del" data-d="'+e.id+'">刪除</button></div></div>';
    box.appendChild(row);
  });
  box.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>{
    askConfirm('刪除這筆費用？',()=>{state.expenses=state.expenses.filter(x=>x.id!==b.dataset.d);save();renderAll();},true);
  });
  box.querySelectorAll('[data-e]').forEach(b=>b.onclick=()=>{
    const e=state.expenses.find(x=>x.id===b.dataset.e);if(!e)return;
    editingId=e.id;selectedParts=new Set(e.parts);
    $('fDate').value=e.date;$('fPayer').value=e.payer;$('fItem').value=e.item;$('fAmount').value=e.amount;
    $('formTitle').textContent='編輯費用';$('submitExp').textContent='儲存修改';
    $('cancelEdit').style.display='block';renderForm();
    window.scrollTo({top:$('formTitle').getBoundingClientRect().top+window.scrollY-80,behavior:'smooth'});
  });
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ---------- summary + settlement ---------- */
function calc(){
  const bal={};state.members.forEach(m=>bal[m.id]={owed:0,paid:0});
  let total=0;
  state.expenses.forEach(e=>{
    total+=e.amount;
    const per=e.amount/e.parts.length;
    e.parts.forEach(p=>{if(bal[p])bal[p].owed+=per;});
    if(bal[e.payer])bal[e.payer].paid+=e.amount;
  });
  return{bal,total};
}
function renderSummary(){
  const{bal,total}=calc();
  $('kpiTotal').textContent=fmt(total);
  $('kpiCount').textContent=state.expenses.length;
  const nets=state.members.map(m=>({m,owed:bal[m.id].owed,paid:bal[m.id].paid,net:bal[m.id].paid-bal[m.id].owed}));
  const sumNet=nets.reduce((s,x)=>s+x.net,0);
  $('kpiBalance').innerHTML=Math.abs(sumNet)<0.01?'<span class="badge-ok">✓ 平衡</span>':'<span class="badge-warn">未平衡</span>';
  const maxAbs=Math.max(1,...nets.map(x=>Math.abs(x.net)));
  const box=$('summary');box.innerHTML='';
  nets.forEach(x=>{
    const pct=Math.abs(x.net)/maxAbs*100;
    const cls=x.net>0.01?'pos':(x.net<-0.01?'neg':'zero');
    const barCls=x.net>=0?'p':'n';
    const row=document.createElement('div');row.className='srow';
    row.innerHTML='<div class="name">'+esc(x.m.name)+'</div>'+
      '<div class="bar-wrap"><div class="bar '+barCls+'" style="width:'+pct+'%"></div></div>'+
      '<div class="net '+cls+'">'+(x.net>0.01?'應收 ':'')+(x.net<-0.01?'應付 ':'')+fmt(Math.abs(x.net))+'</div>'+
      '<div class="sdetail">應付 '+fmt(x.owed)+' · 已付 '+fmt(x.paid)+'</div>';
    box.appendChild(row);
  });
  // settlement (greedy)
  const st=$('settle');st.innerHTML='';
  const debt=nets.filter(x=>x.net<-0.01).map(x=>({name:x.m.name,v:-x.net})).sort((a,b)=>b.v-a.v);
  const cred=nets.filter(x=>x.net>0.01).map(x=>({name:x.m.name,v:x.net})).sort((a,b)=>b.v-a.v);
  if(debt.length&&cred.length){
    const head=document.createElement('div');head.className='sub';head.style.marginBottom='4px';head.textContent='結算建議：';st.appendChild(head);
    let i=0,j=0;
    while(i<debt.length&&j<cred.length){
      const pay=Math.min(debt[i].v,cred[j].v);
      const li=document.createElement('div');li.className='item';
      li.innerHTML='<span>'+esc(debt[i].name)+'</span><span class="arrow">→</span><span>'+esc(cred[j].name)+'</span><span class="amt">'+fmt(pay)+'</span>';
      st.appendChild(li);
      debt[i].v-=pay;cred[j].v-=pay;
      if(debt[i].v<0.01)i++; if(cred[j].v<0.01)j++;
    }
  }else if(state.expenses.length){
    st.innerHTML='<div class="empty">全部結清，不需轉帳 ✓</div>';
  }
}

/* ---------- backups (最近 6 次，以輸入日期為依據) ---------- */
function makeBackup(){
  if(state.expenses.length===0)return false;
  const dates=state.expenses.map(e=>e.date).sort();
  const label=dates[0]===dates[dates.length-1]?dates[0]:dates[0]+' ~ '+dates[dates.length-1];
  state.backups.unshift({
    id:uid(), label, count:state.expenses.length,
    total:state.expenses.reduce((s,e)=>s+e.amount,0),
    savedAt:new Date().toISOString(),
    members:JSON.parse(JSON.stringify(state.members)),
    expenses:JSON.parse(JSON.stringify(state.expenses))
  });
  state.backups=state.backups.slice(0,6);
  return true;
}
function renderBackups(){
  const box=$('bkList');box.innerHTML='';
  if(state.backups.length===0){box.innerHTML='<div class="empty">尚無備份</div>';return;}
  state.backups.forEach(b=>{
    const d=new Date(b.savedAt);
    const row=document.createElement('div');row.className='bk';
    row.innerHTML='<div><div class="t1">'+b.label+'</div>'+
      '<div class="t2">'+b.count+' 筆 · 共 '+fmt(b.total)+' · 存於 '+
      d.toLocaleDateString('zh-Hant')+' '+d.toLocaleTimeString('zh-Hant',{hour:'2-digit',minute:'2-digit'})+'</div></div>'+
      '<div style="display:flex;gap:8px"><button class="linkbtn" data-r="'+b.id+'">還原</button>'+
      '<button class="linkbtn del" data-x="'+b.id+'">刪除</button></div>';
    box.appendChild(row);
  });
  box.querySelectorAll('[data-r]').forEach(btn=>btn.onclick=()=>{
    const b=state.backups.find(x=>x.id===btn.dataset.r);if(!b)return;
    askConfirm('還原「'+b.label+'」？\n目前畫面上的資料會被取代。',()=>{
      state.members=JSON.parse(JSON.stringify(b.members));
      state.expenses=JSON.parse(JSON.stringify(b.expenses));
      save();resetForm();renderAll();toast('已還原備份');
    });
  });
  box.querySelectorAll('[data-x]').forEach(btn=>btn.onclick=()=>{
    askConfirm('刪除這份備份？',()=>{state.backups=state.backups.filter(x=>x.id!==btn.dataset.x);save();renderBackups();},true);
  });
}
$('backupNow').onclick=()=>{
  if(makeBackup()){save();renderBackups();toast('已備份');}
  else toast('目前沒有費用可備份');
};
$('clearBtn').onclick=()=>{
  if(state.expenses.length===0){toast('沒有資料需要清除');return;}
  askConfirm('清除所有已輸入的費用？\n成員名稱會保留，並自動先備份一次。',()=>{
    makeBackup();
    state.expenses=[];
    save();resetForm();renderAll();toast('已清除，成員已保留');
  },true);
};

/* ---------- boot ---------- */
function renderAll(){renderMembers();renderForm();renderExpenses();renderSummary();renderBackups();}
load();resetForm();renderAll();
</script>
